<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지금 몇교시? - 실시간 시간표</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .active-row { border-left: 4px solid #2563eb; background-color: #eff6ff; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 pb-20">

    <!-- Header & Live Display -->
    <div class="sticky top-0 z-10 glass border-b border-slate-200 p-6 mb-6">
        <div class="max-w-md mx-auto text-center">
            <h1 class="text-xl font-bold text-blue-600 mb-2">지금 몇교시?</h1>
            <div id="clock" class="text-4xl font-extrabold tracking-tight mb-4 text-slate-900">00:00:00</div>
            <div id="status-card" class="bg-blue-600 text-white rounded-2xl p-6 shadow-lg shadow-blue-200 transition-all duration-500">
                <div id="current-label" class="text-xs uppercase tracking-wider opacity-80 mb-1 font-semibold">현재 상태</div>
                <div id="current-status" class="text-2xl font-bold">시간표 로딩 중...</div>
                <div id="next-status" class="text-sm mt-3 pt-3 border-t border-blue-400/50 opacity-90 italic"></div>
            </div>
        </div>
    </div>

    <div class="max-w-md mx-auto px-4 space-y-6">
        
        <!-- Detailed Schedule Section -->
        <section id="schedule-section" class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100">
            <h2 class="font-bold text-lg mb-4 flex items-center justify-between">
                <span>📅 오늘의 시간표 (8교시)</span>
            </h2>
            <div id="schedule-list" class="space-y-3">
                <!-- 리스트가 자바스크립트에 의해 생성됩니다 -->
            </div>
        </section>

    </div>

    <script>
        /**
         * 🛠 시간표 설정 (여기서 시간을 직접 수정하세요)
         * - 8교시 체제로 설정되어 있습니다.
         * - 형식은 "HH:MM" (24시간제)입니다.
         */
        const scheduleData = [
            { name: "1교시", start: "09:00", end: "09:45" },
            { name: "2교시", start: "09:55", end: "10:40" },
            { name: "3교시", start: "10:50", end: "11:35" },
            { name: "4교시", start: "11:45", end: "12:30" },
            { name: "점심시간", start: "12:30", end: "13:20" },
            { name: "5교시", start: "13:20", end: "14:05" },
            { name: "6교시", start: "14:10", end: "14:55" },
            { name: "7교시", start: "15:05", end: "15:40" },
            { name: "8교시", start: "15:40", end: "16:25" }
        ];

        window.onload = () => {
            renderSchedule();
            updateClock();
            setInterval(updateClock, 1000);
        };

        function renderSchedule() {
            const list = document.getElementById('schedule-list');
            list.innerHTML = '';

            scheduleData.forEach((item, index) => {
                const div = document.createElement('div');
                div.id = `row-${index}`;
                div.className = "flex items-center justify-between p-4 bg-slate-50 rounded-xl border border-slate-100 transition-all";
                div.innerHTML = `
                    <div class="flex flex-col">
                        <span class="font-bold text-slate-700">${item.name}</span>
                        <span class="text-xs text-slate-400">${item.start} ~ ${item.end}</span>
                    </div>
                    <div class="text-sm font-medium text-slate-500" id="time-left-${index}"></div>
                `;
                list.appendChild(div);
            });
        }

        function formatTime(date) {
            return date.getHours().toString().padStart(2, '0') + ":" + 
                   date.getMinutes().toString().padStart(2, '0');
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('ko-KR', { hour12: false });
            checkStatus();
        }

        function checkStatus() {
            const now = new Date();
            const nowStr = formatTime(now);
            
            let currentStatus = "일과 외 시간";
            let nextStatus = "수업이 모두 종료되었거나 아직 시작 전입니다.";
            let label = "학교 밖";
            let activeIndex = -1;

            const card = document.getElementById('status-card');

            // 초기화
            scheduleData.forEach((_, i) => {
                const row = document.getElementById(`row-${i}`);
                if (row) row.className = "flex items-center justify-between p-4 bg-slate-50 rounded-xl border border-slate-100 transition-all";
            });

            for (let i = 0; i < scheduleData.length; i++) {
                const item = scheduleData[i];
                
                // 현재 수업 중
                if (nowStr >= item.start && nowStr < item.end) {
                    currentStatus = `지금은 ${item.name} 중`;
                    label = "진행 중";
                    nextStatus = `${item.end}에 종료됩니다.`;
                    activeIndex = i;
                    break;
                } 
                // 쉬는 시간
                else if (i < scheduleData.length - 1 && nowStr >= item.end && nowStr < scheduleData[i+1].start) {
                    currentStatus = "지금은 쉬는 시간";
                    label = "대기 중";
                    nextStatus = `잠시 후 ${scheduleData[i+1].start}부터 ${scheduleData[i+1].name} 시작!`;
                    activeIndex = -1;
                    break;
                }
            }

            document.getElementById('current-status').innerText = currentStatus;
            document.getElementById('current-label').innerText = label;
            document.getElementById('next-status').innerText = nextStatus;

            // 카드 및 행 강조 업데이트
            if (currentStatus === "일과 외 시간") {
                card.classList.replace('bg-blue-600', 'bg-slate-500');
                card.classList.replace('shadow-blue-200', 'shadow-slate-200');
            } else {
                card.classList.replace('bg-slate-500', 'bg-blue-600');
                card.classList.replace('shadow-slate-200', 'shadow-blue-200');
            }

            if (activeIndex !== -1) {
                const activeRow = document.getElementById(`row-${activeIndex}`);
                if (activeRow) activeRow.className = "flex items-center justify-between p-4 active-row rounded-xl border border-blue-200 transition-all shadow-sm";
            }
        }
    </script>
</body>
</html>
